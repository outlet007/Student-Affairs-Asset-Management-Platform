version: '3.8'

services:
  # ---- MySQL Database ----
  db:
    image: mysql:8.0
    container_name: asset-mgmt-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-asset_root_2024}
      MYSQL_DATABASE: ${DB_NAME:-asset_management}
      MYSQL_USER: ${DB_USER:-asset_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-asset_pass_2024}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - asset-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-asset_root_2024}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password

  # ---- Node.js Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asset-mgmt-app
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-asset_management}
      DB_USER: ${DB_USER:-asset_user}
      DB_PASSWORD: ${DB_PASSWORD:-asset_pass_2024}
      SESSION_SECRET: ${SESSION_SECRET:-asset-mgmt-docker-secret-2024}
      PORT: 3000
      NODE_ENV: production
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - app_uploads:/app/uploads
    networks:
      - asset-network
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local
  app_uploads:
    driver: local

networks:
  asset-network:
    driver: bridge
